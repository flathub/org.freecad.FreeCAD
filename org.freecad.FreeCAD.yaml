app-id: org.freecad.FreeCAD
default-branch: beta
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: FreeCAD
desktop-file-name-prefix: "(beta) "
rename-mime-icons:
  - application-x-extension-fcstd
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=network
  - --filesystem=host # needed to make file saving work
  - --filesystem=xdg-run/gvfs # make GnomeVFS accessible
  - --filesystem=/run/spnav.sock:ro # allow access to spacenavd
  - --talk-name=org.freedesktop.Flatpak # to launch openscad
  - --env=TMPDIR=/var/tmp
  - --env=SPNAV_SOCKET=/run/spnav.sock
sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm21
cleanup:
  - /include
  - /share/aclocal
  - /share/cmake
  - /lib/cmake
  - /share/man
  - '*.a'
  - '*.la'

build-options:
  append-path: /usr/lib/sdk/llvm21/bin
  append-ld-library-path: /usr/lib/sdk/llvm21/lib
modules:

  - shared-modules/glu/glu-9.json

  - name: pyside
    buildsystem: cmake-ninja
    builddir: true
    build-options:
      cflags: -I/usr/include/python3.13
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_TESTS=OFF
      - -DCMAKE_SKIP_RPATH:BOOL=YES
      - -DFORCE_LIMITED_API=OFF
    cleanup:
      - /bin
    sources:
      - type: archive
        url: https://download.qt.io/official_releases/QtForPython/pyside6/PySide6-6.10.1-src/pyside-setup-everywhere-src-6.10.1.tar.xz
        sha256: fd54f40853d61dfd845dbb40d4f89fbd63df5ed341b3d9a2c77bb5c947a0a838
        # patch from https://build.opensuse.org/package/show/KDE:Qt6/python3-pyside6
      - type: patch
        path: patches/0001-Always-link-to-python-libraries.patch
      - type: patch
        path: patches/0001-Revert-Modify-headers-installation-for-CMake-builds.patch
      - type: patch
        path: patches/0001-Fix-installation.patch
      - type: shell
        commands:
          - cp -R /usr/include/Qt* sources/pyside6/PySide6/
    post-install:
      # Manually fix path in cmake config file https://qt-project.atlassian.net/browse/PYSIDE-3210
      # Fixes adopt from https://build.opensuse.org/projects/openSUSE:Factory/packages/python3-pyside6/files/python3-pyside6.spec
      - sed -i 's|${PACKAGE_PREFIX_DIR}/typesystems|/app/share/PySide6/typesystems|g' /app/lib/cmake/PySide6/PySide6Config*.cmake
      - sed -i 's|${PACKAGE_PREFIX_DIR}/glue|/app/share/PySide6/glue|g' /app/lib/cmake/PySide6/PySide6Config*.cmake
    modules:
      # needed as the cmake super project doesn't find the shiboken python module
      - name: shiboken
        buildsystem: cmake-ninja
        builddir: true
        subdir: sources/shiboken6
        config-opts:
          - -DBUILD_TESTS=OFF
          - -DFORCE_LIMITED_API=OFF
        sources:
          - type: archive
            url: https://download.qt.io/official_releases/QtForPython/pyside6/PySide6-6.10.0-src/pyside-setup-everywhere-src-6.10.0.tar.xz
            sha256: f6e18dc880f59fb6c5c37f9f408971d65642dfc7510a15d794b4a3a8e15fcecc

  - name: swig
    config-opts:
      - --without-pcre
    cleanup:
      - '*'
    sources:
      - type: archive
        url: https://downloads.sourceforge.net/project/swig/swig/swig-4.0.2/swig-4.0.2.tar.gz
        sha256: d53be9730d8d58a16bf0cbd1f8ac0c0c3e1090573168bfa151b01eb47fa906fc

  - name: libXmu
    cleanup:
      - /share/doc
    sources:
      - type: archive
        url: https://www.x.org/archive//individual/lib/libXmu-1.1.2.tar.bz2
        sha256: 756edc7c383254eef8b4e1b733c3bf1dc061b523c9f9833ac7058378b8349d0b

  - name: eigen
    buildsystem: cmake-ninja
    builddir: true
    sources:
      - type: archive
        url: https://gitlab.com/libeigen/eigen/-/archive/3.4.1/eigen-3.4.1.tar.bz2
        sha256: 8bb7280b7551bf06418d11a9671fdf998cb927830cf21589b394382d26779821

  - name: graphviz
    sources:
      - type: git
        url: https://gitlab.com/graphviz/graphviz
        tag: 14.0.2
        commit: 8fe0778817801d0d88406c28e22c4b170cdbd517

  - name: xerces-c
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    cleanup:
      - /bin
      - /share/doc
    sources:
      - type: archive
        url: https://downloads.apache.org/xerces/c/3/sources/xerces-c-3.3.0.tar.gz
        sha256: 9555f1d06f82987fbb4658862705515740414fd34b4db6ad2ed76a2dc08d3bde
      - type: patch
        path: patches/xerces-c-cxx17.patch

  - name: openmpi
    cleanup:
      - /bin
    sources:
      - type: archive
        url: https://download.open-mpi.org/release/open-mpi/v5.0/openmpi-5.0.5.tar.bz2
        sha256: 6588d57c0a4bd299a24103f4e196051b29e8b55fbda49e11d5b3d32030a32776

  - name: hdf5
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DALLOW_UNSUPPORTED=ON
      - -DHDF5_BUILD_HL_LIB=ON
      - -DHDF5_BUILD_CPP_LIB=ON
      - -DHDF5_ENABLE_PARALLEL=ON
      - -DHDF5_ENABLE_Z_LIB_SUPPORT=ON
    cleanup:
      - /bin
      - /cmake
    sources:
      - type: archive
        url: https://github.com/HDFGroup/hdf5/archive/hdf5-1_12_3.tar.gz
        sha256: 39e2e3e25f2263f2dc3370556c174952675d7ac51c4d6f7d4f5e8b3a8bd10ac6

  - name: med
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    cleanup:
      - /bin
      - /share/doc
    sources:
      - type: archive
        url: https://github.com/chennes/med/archive/refs/tags/v5.0.0.tar.gz
        sha256: 8701f142087b87e8b74958fd0432498eadf28011b20ad05cf56bf911be081888
        # Patch from https://build.opensuse.org/package/show/science/med-tools
      - type: patch
        path: patches/fix-cmakefiles.patch
      - type: patch
        path: patches/0003-Avoid-format-warnings-on-64-bit.patch
      - type: patch
        path: patches/Fix-no_return_in_nonvoid_function.patch
      - type: patch
        path: patches/0001-Fix-AppendOutput-signature-for-Swig-4.3.patch
      - type: patch
        path: patches/med-tools-hdf1_14.patch
      - type: patch
        path: patches/med-tools-python3_13.patch
      - type: patch
        path: patches/med-tools-gcc15.patch

  - name: libspnav
    sources:
      - type: archive
        url: https://github.com/FreeSpacenav/libspnav/releases/download/v1.2/libspnav-1.2.tar.gz
        sha256: 093747e7e03b232e08ff77f1ad7f48552c06ac5236316a5012db4269951c39db

  - name: boost
    buildsystem: simple
    build-commands:
      - ./bootstrap.sh --prefix=/app --with-libraries=filesystem,program_options,regex,system,thread,python,date_time,chrono,atomic
      - ./b2 install -j $FLATPAK_BUILDER_N_JOBS
    sources:
      - type: archive
        url: https://archives.boost.io/release/1.84.0/source/boost_1_84_0.tar.bz2
        sha256: cc4b893acf645c9d4b698e9a0f08ca8846aa5d6c68275c14c3e7949c24109454

  - name: coin
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    cleanup:
      - /bin
    sources:
      - type: archive
        url: https://github.com/coin3d/coin/releases/download/v4.0.6/coin-4.0.6-src.tar.gz
        sha256: e04a600809593feb2acbec4282803d1673926ddfa1d9fcd402f35ec26fc52e7e

  - name: soqt
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DSOQT_BUILD_DOCUMENTATION=OFF
    sources:
      - type: git
        url: https://github.com/coin3d/soqt.git
        tag: v1.6.4
        commit: cfc4fee34d003aa454aa55159828081fc7cbbe38

  - name: pivy
    buildsystem: cmake-ninja
    config-opts:
      - -DPIVY_USE_QT6=ON
    sources:
      - type: archive
        url: https://github.com/coin3d/pivy/archive/refs/tags/0.6.10.tar.gz
        sha256: 7b409816c9fad84cf94f93659281f9dd2501d285eb2fc609e9401a3d004ce723
      - type: shell
        commands:
          - |
            sitepackagesDir=$(python3 -c 'import sysconfig; print(sysconfig.get_paths()["platlib"].replace("/usr","/app"))')
            sed -i "s|\${Python_SITEARCH}|$sitepackagesDir|" {*/,./}CMakeLists.txt

    # python3 flatpak-pip-generator flit-core tomli packaging pybind11 setuptools_scm_git_archive setuptools_scm setuptools meson-python numpy contourpy cycler fonttools cppy kiwisolver pillow six pyparsing backports_functools_lru_cache python-dateutil pycollada ply requests pyyaml scikit_build_core lark pysolar pip -o python_deps

    # requests required by BIM wokrbench https://github.com/FreeCAD/FreeCAD/issues/17560
    # scikit_build_core build dependency for opencamlib
    # pip For add-on manager
    # pyyaml For the FEM workbench.
    # pysolar For the BIM workbench to generate Solar diagrams. https://github.com/flathub/org.freecadweb.FreeCAD/issues/114
  - python_deps.json

  - name: matplotlib
    buildsystem: simple
    build-commands:
      - mkdir -p subprojects/packagecache/
      - cp qhull-8.0.2.tgz freetype-2.6.1.tar.gz subprojects/packagecache/ #Copy qhull and freetype to correct dir so matplotlib will not try to download it
      - python3 -mpip install . --no-index --find-links=file://${PWD} --prefix=${FLATPAK_DEST}
        --no-build-isolation
    sources:
      - type: file
        url: https://download.savannah.gnu.org/releases/freetype/freetype-old/freetype-2.6.1.tar.gz
        sha256: 0a3c7dfbda6da1e8fce29232e8e96d987ababbbf71ebc8c75659e4132c367014
        dest-filename: freetype-2.6.1.tar.gz
      - type: file
        dest-filename: qhull-8.0.2.tgz
        url: https://github.com/qhull/qhull/archive/v8.0.2/qhull-8.0.2.tar.gz
        sha256: 8774e9a12c70b0180b95d6b0b563c5aa4bea8d5960c15e18ae3b6d2521d64f8b
      - type: archive
        url: https://files.pythonhosted.org/packages/ae/e2/d2d5295be2f44c678ebaf3544ba32d20c1f9ef08c49fe47f496180e1db15/matplotlib-3.10.7.tar.gz
        sha256: a06ba7e2a2ef9131c79c49e63dad355d2d878413a0376c1727c8b9335ff731c7
        x-checker-data:
          type: pypi
          name: matplotlib

  - name: git
    make-args:
      - NO_TCLTK=YesPlease
      - INSTALL_SYMLINKS=1
    make-install-args:
      - NO_TCLTK=YesPlease
      - INSTALL_SYMLINKS=1
    post-install:
      - find . -type f -name perllocal.pod -delete
    sources:
      - type: archive
        url: https://www.kernel.org/pub/software/scm/git/git-2.49.0.tar.gz
        sha256: f8047f572f665bebeb637fd5f14678f31b3ca5d2ff9a18f20bd925bd48f75d3c

  - name: geos
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    cleanup:
      - /bin
    sources:
      - type: archive
        url: https://download.osgeo.org/geos/geos-3.14.1.tar.bz2
        sha256: 3c20919cda9a505db07b5216baa980bacdaa0702da715b43f176fb07eff7e716

  - name: netcdf
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    cleanup:
      - /bin
    sources:
      - type: archive
        url: https://downloads.unidata.ucar.edu/netcdf-c/4.9.2/netcdf-c-4.9.2.tar.gz
        sha256: cf11babbbdb9963f09f55079e0b019f6d0371f52f8e1264a5ba8e9fdab1a6c48

  - name: freeimage
    buildsystem: simple
    build-options:
      cxxflags: -std=c++14
      cflags: -Wno-error=implicit-function-declaration
      arch:
        aarch64:
          # See https://sourceforge.net/p/freeimage/bugs/325/
          cflags: -fPIC -DPNG_ARM_NEON_OPT=0
          cxxflags: -fPIC
    build-commands:
      - sh gensrclist.sh
      - sh genfipsrclist.sh
      - make -f Makefile.gnu -j $FLATPAK_BUILDER_N_JOBS
      - make -f Makefile.fip -j $FLATPAK_BUILDER_N_JOBS
      - make -f Makefile.gnu INCDIR=/app/include INSTALLDIR=/app/lib install
      - make -f Makefile.fip INCDIR=/app/include INSTALLDIR=/app/lib install
    sources:
      - type: archive
        url: https://downloads.sourceforge.net/project/freeimage/Source%20Distribution/3.18.0/FreeImage3180.zip
        sha256: f41379682f9ada94ea7b34fe86bf9ee00935a3147be41b6569c9605a53e438fd
      - type: shell
        commands:
          - sed -i 's/-o root -g root //g' Makefile.{gnu,fip}

  - name: VTK
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DVTK_BUILD_TESTING=OFF
      - -DVTK_MODULE_ENABLE_VTK_TestingCore=NO
    cleanup:
      - /bin
      - /share/doc
    sources:
      - type: archive
        url: https://vtk.org/files/release/9.5/VTK-9.5.2.tar.gz
        sha256: cee64b98d270ff7302daf1ef13458dff5d5ac1ecb45d47723835f7f7d562c989

  - name: rapidjson
    buildsystem: cmake-ninja
    config-opts:
    - -DRAPIDJSON_BUILD_DOC=OFF
    - -DRAPIDJSON_BUILD_EXAMPLES=OFF
    - -DRAPIDJSON_BUILD_TESTS=OFF
    - -DRAPIDJSON_BUILD_THIRDPARTY_GTEST=OFF
    cleanup:
      - /include
      - /lib/cmake
      - /lib/pkgconfig
      - /share/doc
    sources:
        # rapidjson is famously known for not tagging new release, previous tagged version was 2016.
        # Latest tagged version does not build anymore, switch to latest commit.
        # https://github.com/Tencent/rapidjson/issues/2321
      - type: git
        url: https://github.com/Tencent/rapidjson.git
        commit: 24b5e7a8b27f42fa16b96fc70aade9106cf7102f

  - name: tcl
    buildsystem: autotools
    subdir: unix
    config-opts:
        - --enable-threads
        - --enable-shared
    post-install:
        - chmod 755 /app/lib/libtcl*.so
    sources:
        - type: archive
          url: https://prdownloads.sourceforge.net/tcl/tcl8.6.15-src.tar.gz
          sha256: 861e159753f2e2fbd6ec1484103715b0be56be3357522b858d3cbb5f893ffef1
  - name: tk
    buildsystem: autotools
    subdir: unix
    post-install:
        - chmod +w ${FLATPAK_DEST}/lib/libtk*.so
        - ln -sf /app/bin/wish8.6 /app/bin/wish
    sources:
        - type: archive
          url: https://prdownloads.sourceforge.net/tcl/tk8.6.15-src.tar.gz
          sha256: 550969f35379f952b3020f3ab7b9dd5bfd11c1ef7c9b7c6a75f5c49aca793fec

  - name: opencascade
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DUSE_FREEIMAGE=ON
      - -DUSE_VTK=ON
      - -DUSE_RAPIDJSON=ON
      - -DBUILD_RELEASE_DISABLE_EXCEPTIONS=OFF
      - -DBUILD_DOC_Overview=OFF
      - -D3RDPARTY_VTK_INCLUDE_DIR=/app/include/vtk-9.5/
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    cleanup:
      - /bin
    sources:
      - type: git
        url: https://github.com/FreeCAD/OCCT.git
        commit: 8db1faa32e326889fc770b4389629d686ccb52d5 # tag patched/V7_8_1
      - type: patch # upstream patch, included in occt 7.9 release
        path: patches/occt-freetype-fix-compilation.patch

    #Update from 5.3.1 because of this issue: https://github.com/CGAL/cgal/issues/8313
  - name: cgal
    cleanup:
      - /include
      - /lib/cmake
      - /share/man
      - /bin
    buildsystem: cmake-ninja
    config-opts:
      - -DCGAL_HEADER_ONLY=ON
    sources:
      - type: archive
        url: https://github.com/CGAL/cgal/releases/download/v6.1/CGAL-6.1.tar.xz
        sha256: 618da8a8b3f5be46b4f0a47a1efb3c9e6c03d6aab0f5531d56d355d32701d79f

  - name: nlohmann-json
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://github.com/nlohmann/json/archive/refs/tags/v3.11.3.tar.gz
        sha256: 0d8ef5af7f9794e3263480193c491549b2ba6cc74bb018906202ada498a79406

  - name: IfcOpenShell
    buildsystem: cmake-ninja
    builddir: true
    subdir: cmake
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DBUILD_EXAMPLES=OFF
      - -DBUILD_GEOMSERVER=OFF
      - -DBUILD_CONVERT=OFF
      - -DENABLE_BUILD_OPTIMIZATIONS=ON
      - -DCGAL_INCLUDE_DIR=/app/include
      - -DOCC_INCLUDE_DIR=/app/include/opencascade
      - -DOCC_LIBRARY_DIR=/app/lib
      - -DHDF5_INCLUDE_DIR=/app/include
      - -DHDF5_LIBRARY_DIR=/app/lib
      - -DEIGEN_DIR=/app/include/eigen3
      - -DCOLLADA_SUPPORT=OFF
      - -DLIBXML2_INCLUDE_DIR=/usr/include/libxml2
    build-options:
      arch:
        # config-opts with meson doesn't do shell variable substitutions
        # so we can't use $FLATPAK_ARCH
        x86_64:
          config-opts:
            - -DLIBXML2_LIBRARIES=/usr/lib/x86_64-linux-gnu/libxml2.so
            - -DGMP_LIBRARY_DIR=/usr/lib/x86_64-linux-gnu #look for gmp and mpfr that come with sdk
            - -DMPFR_LIBRARY_DIR=/usr/lib/x86_64-linux-gnu
        aarch64:
          config-opts:
            - -DLIBXML2_LIBRARIES=/usr/lib/aarch64-linux-gnu/libxml2.so
            - -DGMP_LIBRARY_DIR=/usr/lib/aarch64-linux-gnu
            - -DMPFR_LIBRARY_DIR=/usr/lib/aarch64-linux-gnu
    build-commands:
      - sed -i 's|/usr|/app|g' ifcwrap/cmake_install.cmake
      - sed -i 's|/usr|/app|g' ifcwrap/cmake_install.cmake
    sources:
      - type: git
        url: https://github.com/IfcOpenShell/IfcOpenShell.git
        tag: ifcopenshell-python-0.8.3
        commit: 6d8e513f97bf88506f61fb8143c460a27695edb2
      - type: patch
        paths:
          - patches/IfcOpenShell-hdf5.patch

  - name: OpenBLAS
    no-autogen: true
    make-args:
      - DYNAMIC_ARCH=1
      - DYNAMIC_OLDER=1
      - FC=gfortran
      - TARGET=GENERIC
      - USE_OPENMP=0
    make-install-args:
      - PREFIX=/app
    cleanup:
      - /bin
      - /include
      - /lib/cmake
      - /lib/*.a
      - /lib/*.la
      - /lib/pkgconfig
      - /share/man
    sources:
      - type: archive
        url: https://github.com/OpenMathLib/OpenBLAS/releases/download/v0.3.30/OpenBLAS-0.3.30.tar.gz
        sha256: 27342cff518646afb4c2b976d809102e368957974c250a25ccc965e53063c95d

  - name: arpack
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DBUILD_SHARED_LIBS=OFF #calculix-ccx look for libarpack.a
    build-options:
      env:
        FFLAGS: -fallow-argument-mismatch
        FCFLAGS: -fallow-argument-mismatch
    sources:
      - type: archive
        url: https://github.com/opencollab/arpack-ng/archive/refs/tags/3.9.1.tar.gz
        sha256: f6641deb07fa69165b7815de9008af3ea47eb39b2bb97521fbf74c97aba6e844

  - name: spooles
    buildsystem: simple
    build-commands:
      - make CC=gcc lib
      - make -C MT/src CC=gcc
      - install -Dt /app/lib *.a MT/src/*.a
      - for f in $(find -name '*.h'); do install -Dt "/app/include/$(dirname "$f")" "$f"; done
    sources:
      - type: archive
        url:  http://deb.debian.org/debian/pool/main/s/spooles/spooles_2.2.orig.tar.gz
        sha256: a84559a0e987a1e423055ef4fdf3035d55b65bbe4bf915efaa1a35bef7f8c5dd
        strip-components: 0
        mirror-urls:
          - http://www.netlib.org/linalg/spooles/spooles.2.2.tgz # can be slow
      - type: patch
        path: patches/spooles-fix-compilation.patch

  - name: calculix-ccx
    buildsystem: simple
    build-commands:
      - make -C ccx_*/src -f Makefile_MT -j $FLATPAK_BUILDER_N_JOBS
      - install -m0755 ccx_*/src/ccx_*_MT /app/bin/ccx
    sources:
      - type: archive
        url: http://www.dhondt.de/ccx_2.22.src.tar.bz2
        sha256: 3a94dcc775a31f570229734b341d6b06301ebdc759863df901c8b9bf1854c0bc
        strip-components: 2
      - type: patch
        path: patches/calculix-cxx-paths.patch

  - name: gmsh
    buildsystem: cmake-ninja
    builddir: true
    cleanup:
      - /share/doc
    sources:
      - type: archive
        url: https://gmsh.info/src/gmsh-4.15.0-source.tgz
        sha256: abb2632715bd7d0130ded7144fd6263635cd7dea883b8df61ba4da58ce6a1dfe

  - name: fmt
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_SHARED_LIBS=ON
    sources:
      - type: git
        url: https://github.com/fmtlib/fmt.git
        commit: a33701196adfad74917046096bf5a2aa0ab0bb50 # tag 9.1.0

  - name: yaml-cpp
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_POSITION_INDEPENDENT_CODE=ON
      - -DBUILD_SHARED_LIBS=ON
      - -DYAML_BUILD_SHARED_LIBS=ON
      - -DYAML_CPP_BUILD_TOOLS=OFF
      - -DYAML_CPP_BUILD_TESTS=OFF
      - -DYAML_CPP_BUILD_CONTRIB=OFF
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    sources:
      - type: archive
        url: https://github.com/jbeder/yaml-cpp/archive/refs/tags/0.8.0.tar.gz
        sha256: fbe74bbdcee21d656715688706da3c8becfd946d92cd44705cc6098bb23b3a16
      - type: patch
        path: patches/yaml-cpp-gcc15.patch

  - name: opencamlib
    buildsystem: simple
    build-commands:
      - pip3 install --exists-action=i --ignore-installed --no-index --find-links="file://${PWD}" --prefix=${FLATPAK_DEST} . --no-build-isolation
    build-options:
      env:
        - CMAKE_ARGS: "${CMAKE_ARGS} -D BUILD_DOC:BOOL=OFF -D VERSION_STRING:STRING=2023.01.11"
    sources:
      - type: archive
        url: https://github.com/aewallin/opencamlib/archive/2023.01.11/opencamlib-2023.01.11.tar.gz
        sha256: 07fd9b61c39c4d600e441d67edbafc1015e9e3fabd88b561a647f98fedf31d41
      - type: patch
        path: patches/opencamlib-boost-shared-no-git-version-command.patch

  - name: pybind11
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DPYBIND11_INSTALL:BOOL=ON
      - -DPYBIND11_TEST:BOOL=OFF
      - -DPYTHON_INCLUDE_DIRS=/usr/include/python3.13
    sources:
      - type: git
        url: https://github.com/pybind/pybind11
        tag: v3.0.1
        commit: f5fbe867d2d26e4a0a9177a51f6e568868ad3dc8
        x-checker-data:
          type: git
          tag-pattern: ^v?([\d.]+)$

  - name: FreeCAD
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DFC_FLATPAK=ON
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DENABLE_DEVELOPER_TESTS=OFF
      - -DCMAKE_INSTALL_PREFIX=/app/freecad
      - -DCMAKE_INSTALL_DATAROOTDIR=/app/share
      # While redundant (this triggers a warning with the linter) removing this
      # cause CMake to stop finding dependencies.
      - -DCMAKE_PREFIX_PATH=/app
      - -DSHIBOKEN_INCLUDE_DIR=/app/lib/python3.13/site-packages/shiboken6_generator/include
      - -DPYSIDE_INCLUDE_DIR=/app/lib/python3.13/site-packages/PySide6/include
      - -DINSTALL_TO_SITEPACKAGES=ON
      - -DFREECAD_USE_PYBIND11=ON
    post-install:
      - install -Dm755 ../openscad.sh ${FLATPAK_DEST}/bin/openscad
      - ln -s /app/freecad/bin/FreeCADCmd /app/bin/FreeCADCmd
      - ln -s /app/freecad/bin/FreeCADCmd /app/bin/freecadcmd
      - ln -s /app/freecad/bin/FreeCAD /app/bin/FreeCAD
      - ln -s /app/freecad/bin/FreeCAD /app/bin/freecad
      # The BaseApp has the .so in the python path. Link them to not have to set LD_LIBRARY_PATH.
      - ln -s /app/lib/python3.13/site-packages/shiboken6/libshiboken6.abi3.so.6.10 -t /app/lib
      - ln -s /app/lib/python3.13/site-packages/PySide6/libpyside6.abi3.so.6.10 -t /app/lib
    sources:
      - type: git
        url: https://github.com/FreeCAD/FreeCAD.git
        tag: weekly-2025.11.26
        commit: de230cfaa75433441366ad09a4d5fda828e7bfdb
      # OpenSCADUtils.py have since been change and the patch is not applicable, need testing.
      # - type: patch
      #   path: patches/OpenSCAD_transfermechanism.patch
      - type: file
        path: openscad.sh
      - type: shell
        commands:
          # revcount needs to be updated any time the source commit or tag is changed
          # to obtain the revcount for a given gitRef (commit hash, branch or tag) run
          # echo $(($(curl -s 'https://api.github.com/repos/FreeCAD/FreeCAD/compare/120ca87015...'"$gitRef"'' | grep '"ahead_by":' | sed -s 's/ //g;s/"ahead_by"://;s/,//')+1))
          - |
            revcount=44355
            sed -i 's|${PACKAGE_WCREF}|'"$revcount"' (Git)|' src/Build/Version.h.cmake
            sed -i 's|${PACKAGE_WCURL}|https://github.com/FreeCAD/FreeCAD.git|' src/Build/Version.h.cmake
          - | # fix paths for flatpak environment
            sed -i 's|/usr|/app|g' cMake/FindOCC.cmake src/Gui/GraphvizView.cpp
            sitepackagesDir=$(python3 -c 'import sysconfig; print(sysconfig.get_paths()["platlib"].replace("/usr","/app"))')
            sed -i "s|\${python_libs}|$sitepackagesDir|" src/Ext/freecad/CMakeLists.txt
