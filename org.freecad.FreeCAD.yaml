app-id: org.freecad.FreeCAD
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: FreeCAD
rename-mime-icons:
  - application-x-extension-fcstd
finish-args:
  - --env=QT_QPA_PLATFORM=xcb
  - --share=ipc
  - --socket=x11
  - --device=dri
  - --share=network
  - --filesystem=host # needed to make file saving work
  - --filesystem=xdg-run/gvfs # make GnomeVFS accessible
  - --filesystem=/run/spnav.sock:ro # allow access to spacenavd
  - --talk-name=org.freedesktop.Flatpak # to launch openscad
  - --env=TMPDIR=/var/tmp
  - --env=SPNAV_SOCKET=/run/spnav.sock
sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm20
cleanup:
  - /include
  - /share/aclocal
  - /share/cmake
  - /share/pkgconfig
  - /lib/cmake
  - /lib/pkgconfig
  - /share/man
  - '*.a'
  - '*.la'
build-options:
  append-path: /usr/lib/sdk/llvm20/bin
  append-ld-library-path: /usr/lib/sdk/llvm20/lib
modules:

  - shared-modules/glu/glu-9.json

  - name: pyside
    buildsystem: cmake-ninja
    builddir: true
    build-options:
      cflags: -I/usr/include/python3.13
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_TESTS=OFF
      - -DCMAKE_SKIP_RPATH:BOOL=YES
      - -DFORCE_LIMITED_API=OFF
    cleanup:
      - /bin
      - /lib/plugins/designer
      - /PySide6
    sources:
      - type: archive
        url: https://download.qt.io/official_releases/QtForPython/pyside6/PySide6-6.10.1-src/pyside-setup-everywhere-src-6.10.1.tar.xz
        sha256: fd54f40853d61dfd845dbb40d4f89fbd63df5ed341b3d9a2c77bb5c947a0a838
      - type: shell
        commands:
          - cp -R /usr/include/Qt* sources/pyside6/PySide6/
          # Path PySide6
    post-install:
      - sed -i 's|${PACKAGE_PREFIX_DIR}/typesystems|/app/share/PySide6/typesystems|g' /app/lib/cmake/PySide6/PySide6Config*.cmake
      - sed -i 's|${PACKAGE_PREFIX_DIR}/glue|/app/share/PySide6/glue|g' /app/lib/cmake/PySide6/PySide6Config*.cmake
    modules:
      # needed as the cmake super project doesn't find the shiboken python module
      - name: shiboken
        buildsystem: cmake-ninja
        builddir: true
        subdir: sources/shiboken6
        cleanup:
          - /lib/wheels
          - /shiboken6/include
        config-opts:
          - -DBUILD_TESTS=OFF
          - -DFORCE_LIMITED_API=OFF
        sources:
          - type: archive
            url: https://download.qt.io/official_releases/QtForPython/pyside6/PySide6-6.10.1-src/pyside-setup-everywhere-src-6.10.1.tar.xz
            sha256: fd54f40853d61dfd845dbb40d4f89fbd63df5ed341b3d9a2c77bb5c947a0a838

  - name: swig
    config-opts:
      - --without-pcre
    cleanup:
      - '*'
    sources:
      - type: archive
        url: http://downloads.sourceforge.net/swig/swig-4.3.1.tar.gz
        sha256: 44fc829f70f1e17d635a2b4d69acab38896699ecc24aa023e516e0eabbec61b8
  - name: libXmu
    cleanup:
      - /share/doc
    sources:
      - type: archive
        url: https://www.x.org/archive//individual/lib/libXmu-1.1.2.tar.bz2
        sha256: 756edc7c383254eef8b4e1b733c3bf1dc061b523c9f9833ac7058378b8349d0b

  - name: eigen
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    cleanup:
      - '*'
    sources:
      - type: archive
        url: https://gitlab.com/libeigen/eigen/-/archive/3.4.1/eigen-3.4.1.tar.bz2
        sha256: 8bb7280b7551bf06418d11a9671fdf998cb927830cf21589b394382d26779821

  - name: graphviz
    sources:
      - type: archive
        url: https://gitlab.com/api/v4/projects/4207231/packages/generic/graphviz-releases/13.1.1/graphviz-13.1.1.tar.gz
        sha256: 7d90f72e34f6a07b5f7c23a52c6a9348f67ae68883689bcbfa58e34c67baf594
      - type: shell
        commands:
          - sed -i '/LIBPOSTFIX="64"/s/64//' configure.ac
          - autoreconf -vfi

  - name: xerces-c
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    cleanup:
      - /bin
      - /share/doc
    sources:
      - type: archive
        url: https://downloads.apache.org/xerces/c/3/sources/xerces-c-3.3.0.tar.gz
        sha256: 9555f1d06f82987fbb4658862705515740414fd34b4db6ad2ed76a2dc08d3bde
      - type: patch
        path: patches/xerces-c-cxx17.patch

  - name: openmpi
    cleanup:
      - /bin
    sources:
      - type: archive
        url: https://download.open-mpi.org/release/open-mpi/v5.0/openmpi-5.0.5.tar.bz2
        sha256: 6588d57c0a4bd299a24103f4e196051b29e8b55fbda49e11d5b3d32030a32776

  - name: hdf5
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DALLOW_UNSUPPORTED=ON
      - -DHDF5_BUILD_HL_LIB=ON
      - -DHDF5_BUILD_CPP_LIB=ON
      - -DHDF5_ENABLE_PARALLEL=ON
      - -DHDF5_ENABLE_Z_LIB_SUPPORT=ON
    cleanup:
      - /bin
      - /cmake
    sources:
      - type: archive
        url: https://github.com/HDFGroup/hdf5/archive/hdf5-1_14_3.tar.gz
        sha256: df5ee33c74d5efb59738075ef96f4201588e1f1eeb233f047ac7fd1072dee1f6
  - name: med
    buildsystem: cmake-ninja
    builddir: true
    build-options:
      cflags: -std=gnu18
    config-opts:
      - -D MEDFILE_BUILD_PYTHON=ON
      - -D MEDFILE_BUILD_TESTS=OFF
      - -D MEDFILE_INSTALL_DOC=OFF
    cleanup:
      - /bin
      - /share/doc
    sources:
      - type: archive
        url: https://github.com/chennes/med/archive/refs/tags/v5.0.0.tar.gz
        sha256: 8701f142087b87e8b74958fd0432498eadf28011b20ad05cf56bf911be081888
      - type: patch
        paths: 
          - patches/med-py3.13.patch
          - patches/med-hdf5-1.14.patch
          - patches/med-swig-4.3.0.patch
          - patches/med-gcc15.patch

  - name: libspnav
    sources:
      - type: archive
        url: https://github.com/FreeSpacenav/libspnav/releases/download/v1.2/libspnav-1.2.tar.gz
        sha256: 093747e7e03b232e08ff77f1ad7f48552c06ac5236316a5012db4269951c39db

  - name: boost
    buildsystem: simple
    build-commands:
      - ./bootstrap.sh --prefix=/app --with-libraries=filesystem,program_options,regex,system,thread,python,date_time,chrono,atomic,iostreams
      - ./b2 install -j $FLATPAK_BUILDER_N_JOBS
    sources:
      - type: archive
        url: https://archives.boost.io/release/1.86.0/source/boost_1_86_0.tar.bz2
        sha256: 1bed88e40401b2cb7a1f76d4bab499e352fa4d0c5f31c0dbae64e24d34d7513b
  - name: coin
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    cleanup:
      - /bin
    sources:
      - type: archive
        url: https://github.com/coin3d/coin/releases/download/v4.0.8/coin-4.0.8-src.tar.gz
        sha256: aff6c7edf24cfb935edba46574ec5f83b543c47ff79e40c21fb92dc709b0f2c4
  - name: soqt
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DSOQT_BUILD_DOCUMENTATION=OFF
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    sources:
      - type: git
        url: https://github.com/coin3d/soqt.git
        tag: v1.6.4
        commit: cfc4fee34d003aa454aa55159828081fc7cbbe38
  - name: pivy
    buildsystem: cmake-ninja
    config-opts:
      - -DPIVY_USE_QT6=ON
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    sources:
      - type: archive
        url: https://github.com/coin3d/pivy/archive/refs/tags/0.6.11.tar.gz
        sha256: 78f79bd7d1ce7e8140ceba4b1220136ea1f14b4403b1e463c59fa892feed961e
      - type: shell
        commands:
          - |
            sitepackagesDir=$(python3 -c 'import sysconfig; print(sysconfig.get_paths()["platlib"].replace("/usr","/app"))')
            sed -i "s|\${Python_SITEARCH}|$sitepackagesDir|" {*/,./}CMakeLists.txt

  # modules required to build pybind11, opencamlib and kiwisolver
  - python3-build-dependencies.yaml
  # pybind from pip doesn't install cmake and include files where freecad finds them so we use cmake
  - name: pybind11
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
    sources:
      - type: archive
        url: https://github.com/pybind/pybind11/archive/refs/tags/v3.0.2.tar.gz
        sha256: 2f20a0af0b921815e0e169ea7fec63909869323581b89d7de1553468553f6a2d
      - type: shell
        commands:
        - pip3 install . --verbose --exists-action=i --no-index --prefix=${FLATPAK_DEST} --no-build-isolation
  # modules used in freecad and matplotlib dependencies
  - python3-modules.yaml
  # matplotlib requires additional sources so we can't simply use flatpak-pip-generator for it
  - name: python3-matplotlib
    buildsystem: simple
    build-commands:
      - python3 setup.py install --prefix=/app --root=/
    sources:
      - type: archive
        dest: build/freetype-2.6.1
        url: https://downloads.sourceforge.net/project/freetype/freetype2/2.6.1/freetype-2.6.1.tar.gz
        sha256: 0a3c7dfbda6da1e8fce29232e8e96d987ababbbf71ebc8c75659e4132c367014
      - type: archive
        dest: build/qhull-2020.2
        url: http://www.qhull.org/download/qhull-2020-src-8.0.2.tgz
        sha256: b5c2d7eb833278881b952c8a52d20179eab87766b00b865000469a45c1838b7e
      - type: archive
        url: https://files.pythonhosted.org/packages/b6/f0/3836719cc3982fbba3b840d18a59db1d0ee9ac7986f24e8c0a092851b67b/matplotlib-3.7.5.tar.gz
        sha256: 1e5c971558ebc811aa07f54c7b7c677d78aa518ef4c390e14673a09e0860184a

  - name: git
    make-args:
      - NO_TCLTK=YesPlease
      - INSTALL_SYMLINKS=1
    make-install-args:
      - NO_TCLTK=YesPlease
      - INSTALL_SYMLINKS=1
    post-install:
      - find . -type f -name perllocal.pod -delete
    sources:
      - type: archive
        url: https://www.kernel.org/pub/software/scm/git/git-2.49.0.tar.gz
        sha256: f8047f572f665bebeb637fd5f14678f31b3ca5d2ff9a18f20bd925bd48f75d3c

  - name: geos
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    cleanup:
      - /bin
    sources:
      - type: archive
        url: https://download.osgeo.org/geos/geos-3.7.0.tar.bz2
        sha256: 4fbf41a792fd74293ab59e0a980e8654cd411a9d45416d66eaa12d53d1393fd7

  - name: netcdf
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    cleanup:
      - /bin
    sources:
      - type: archive
        url: https://downloads.unidata.ucar.edu/netcdf-c/4.9.2/netcdf-c-4.9.2.tar.gz
        sha256: cf11babbbdb9963f09f55079e0b019f6d0371f52f8e1264a5ba8e9fdab1a6c48

  - name: freeimage
    buildsystem: simple
    build-options:
      cxxflags: -std=c++14
      cflags: -Wno-error=implicit-function-declaration
      arch:
        aarch64:
          # See https://sourceforge.net/p/freeimage/bugs/325/
          cflags: -fPIC -DPNG_ARM_NEON_OPT=0
          cxxflags: -fPIC
    build-commands:
      - sh gensrclist.sh
      - sh genfipsrclist.sh
      - make -f Makefile.gnu -j $FLATPAK_BUILDER_N_JOBS
      - make -f Makefile.fip -j $FLATPAK_BUILDER_N_JOBS
      - make -f Makefile.gnu INCDIR=/app/include INSTALLDIR=/app/lib install
      - make -f Makefile.fip INCDIR=/app/include INSTALLDIR=/app/lib install
    sources:
      - type: archive
        url: https://downloads.sourceforge.net/project/freeimage/Source%20Distribution/3.18.0/FreeImage3180.zip
        sha256: f41379682f9ada94ea7b34fe86bf9ee00935a3147be41b6569c9605a53e438fd
      - type: shell
        commands:
          - sed -i 's/-o root -g root //g' Makefile.{gnu,fip}

  - name: VTK
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DVTK_WRAP_PYTHON=on
    cleanup:
      - /bin
      - /share/doc
    sources:
      - type: archive
        url: https://www.vtk.org/files/release/9.4/VTK-9.4.2.tar.gz
        sha256: 36c98e0da96bb12a30fe53708097aa9492e7b66d5c3b366e1c8dc251e2856a02

  - name: rapidjson
    buildsystem: cmake-ninja
    config-opts:
      - -DRAPIDJSON_BUILD_DOC=OFF
      - -DRAPIDJSON_BUILD_EXAMPLES=OFF
      - -DRAPIDJSON_BUILD_TESTS=OFF
      - -DRAPIDJSON_BUILD_THIRDPARTY_GTEST=OFF
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    cleanup:
      - /include
      - /lib/cmake
      - /lib/pkgconfig
      - /share/doc
    sources:
      - type: archive
        url: https://github.com/Tencent/rapidjson/archive/refs/tags/v1.1.0.tar.gz
        sha256: bf7ced29704a1e696fbccf2a2b4ea068e7774fa37f6d7dd4039d0787f8bed98e
      - type: patch
        path: patches/rapidjson-remove-assignment-operator.patch

  # for opencascade. It was dropped from 24.08 runtime.
  - name: tcl
    subdir: unix
    build-options:
      no-debuginfo: true
    cleanup:
      - /bin
      - /man
    post-install:
      # Needed for graphviz
      - ln -s tclsh8.6 /app/bin/tclsh
      - chmod 755 /app/lib/libtcl*.so
    sources:
      - type: archive
        url: https://downloads.sourceforge.net/project/tcl/Tcl/8.6.17/tcl8.6.17-src.tar.gz
        sha256: a3903371efcce8a405c5c245d029e9f6850258a60fa3761c4d58995610949b31

  - name: tk
    subdir: unix
    build-options:
      no-debuginfo: true
    make-install-args:
      - install-private-headers
    cleanup:
      - /bin
      - /man
    post-install:
      - chmod 755 /app/lib/libtk*.so
    sources:
      - type: archive
        url: https://downloads.sourceforge.net/project/tcl/Tcl/8.6.17/tk8.6.17-src.tar.gz
        sha256: e4982df6f969c08bf9dd858a6891059b4a3f50dc6c87c10abadbbe2fc4838946

  - name: opencascade
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DUSE_FREEIMAGE=ON
      - -DUSE_VTK=ON
      - -DUSE_RAPIDJSON=ON
      - -DBUILD_RELEASE_DISABLE_EXCEPTIONS=OFF
      - -DBUILD_DOC_Overview=OFF
      - -D3RDPARTY_VTK_INCLUDE_DIR=/app/include/vtk-9.4/
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    cleanup:
      - /bin
    sources:
      - type: git
        url: https://github.com/FreeCAD/OCCT.git
        commit: 8db1faa32e326889fc770b4389629d686ccb52d5 # tag patched/V7_8_1
      - type: patch # upstream patch, included in occt 7.9 release
        path: patches/occt-freetype-fix-compilation.patch

  # new deps for IfcOpenShell
  - name: mpfr
    sources:
      - type: archive
        url: https://ftp.gnu.org/gnu/mpfr/mpfr-3.1.5.tar.xz
        sha256: 015fde82b3979fbe5f83501986d328331ba8ddf008c1ff3da3c238f49ca062bc
  - name: cgal
    cleanup:
      - /include
      - /lib/cmake
      - /share/man
      - /bin
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DCGAL_HEADER_ONLY=ON
    sources:
      - type: archive
        url: https://github.com/CGAL/cgal/releases/download/v6.1/CGAL-6.1.tar.xz
        sha256: 618da8a8b3f5be46b4f0a47a1efb3c9e6c03d6aab0f5531d56d355d32701d79f
  - name: nlohmann-json
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://github.com/nlohmann/json/archive/refs/tags/v3.12.0.tar.gz
        sha256: 4b92eb0c06d10683f7447ce9406cb97cd4b453be18d7279320f7b2f025c10187

  - name: IfcOpenShell
    buildsystem: cmake-ninja
    builddir: true
    subdir: cmake
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DBUILD_EXAMPLES=OFF
      - -DBUILD_GEOMSERVER=OFF
      - -DBUILD_CONVERT=ON
      - -DENABLE_BUILD_OPTIMIZATIONS=ON
      - -DGLTF_SUPPORT=ON
      - -DHDF5_SUPPORT=ON
      - -DCOLLADA_SUPPORT=OFF
      - -DLIBXML2_INCLUDE_DIR=/usr/include/libxml2
    build-options:
      cxxflags: -std=gnu++14
    build-commands:
      - sed -i 's|/usr|/app|g' ifcwrap/cmake_install.cmake
    sources:
      - type: git
        url: https://github.com/IfcOpenShell/IfcOpenShell.git
        tag: ifcopenshell-python-0.8.4
        commit: 158fe92644cfe2bc37be513d9838c95d9f2233cf
  - name: lapack
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: archive
        url: https://github.com/Reference-LAPACK/lapack/archive/refs/tags/v3.10.1.tar.gz
        sha256: cd005cd021f144d7d5f7f33c943942db9f03a28d110d6a3b80d718a295f7f714
      - type: patch
        path: patches/lapack-cmake.patch

  - name: arpack
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    build-options:
      env:
        FFLAGS: -fallow-argument-mismatch
        FCFLAGS: -fallow-argument-mismatch
    sources:
      - type: archive
        url: https://github.com/opencollab/arpack-ng/archive/refs/tags/3.7.0.tar.gz
        sha256: 972e3fc3cd0b9d6b5a737c9bf6fd07515c0d6549319d4ffb06970e64fa3cc2d6

  - name: spooles
    buildsystem: simple
    build-commands:
      - make CC=gcc lib
      - make -C MT/src CC=gcc
      - install -Dt /app/lib *.a MT/src/*.a
      - for f in $(find -name '*.h'); do install -Dt "/app/include/$(dirname "$f")" "$f"; done
    sources:
      - type: archive
        url: http://deb.debian.org/debian/pool/main/s/spooles/spooles_2.2.orig.tar.gz
        sha256: a84559a0e987a1e423055ef4fdf3035d55b65bbe4bf915efaa1a35bef7f8c5dd
        strip-components: 0
        mirror-urls:
          - http://www.netlib.org/linalg/spooles/spooles.2.2.tgz # can be slow
      - type: patch
        path: patches/spooles-fix-compilation.patch

  - name: OpenBLAS
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
      - -DDYNAMIC_ARCH=ON
    sources:
      - type: archive
        url: https://github.com/OpenMathLib/OpenBLAS/archive/refs/tags/v0.3.28.tar.gz
        sha256: f1003466ad074e9b0c8d421a204121100b0751c96fc6fcf3d1456bd12f8a00a1

  - name: calculix-ccx
    buildsystem: simple
    build-commands:
      - make -C ccx_*/src -f Makefile_MT -j $FLATPAK_BUILDER_N_JOBS
      - install -m0755 ccx_*/src/ccx_*_MT /app/bin/ccx
    sources:
      - type: archive
        url: http://www.dhondt.de/ccx_2.23.src.tar.bz2
        sha256: 9c88385c10fb04f5dc6c4e98027a51bebdd8aee3920e05190d6c1dd08357d6e7
        strip-components: 2
      - type: patch
        path: patches/calculix-cxx-paths.patch

  - name: gmsh
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
    cleanup:
      - /share/doc
    sources:
      - type: archive
        url: https://gmsh.info/src/gmsh-4.15.0-source.tgz
        sha256: abb2632715bd7d0130ded7144fd6263635cd7dea883b8df61ba4da58ce6a1dfe

  - name: yaml-cpp
    buildsystem: cmake-ninja
    build-options:
      cxxflags: -include cstdint
    config-opts:
      - -DBUILD_SHARED_LIBS=ON
    sources:
      - type: git
        url: https://github.com/jbeder/yaml-cpp
        commit: 56e3bb550c91fd7005566f19c079cb7a503223cf # tag yaml-cpp-0.9.0

  - name: opencamlib
    buildsystem: simple
    build-commands:
      - pip3 install --exists-action=i --ignore-installed --no-index --find-links="file://${PWD}" --prefix=${FLATPAK_DEST} . --no-build-isolation
    build-options:
      env:
        - CMAKE_ARGS: "${CMAKE_ARGS} -D BUILD_DOC:BOOL=OFF -D VERSION_STRING:STRING=2023.01.11"
    sources:
      - type: archive
        url: https://github.com/aewallin/opencamlib/archive/2023.01.11/opencamlib-2023.01.11.tar.gz
        sha256: 07fd9b61c39c4d600e441d67edbafc1015e9e3fabd88b561a647f98fedf31d41
      - type: patch
        path: patches/opencamlib-boost-shared-no-git-version-command.patch

  - name: FreeCAD
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DFC_FLATPAK=ON
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DENABLE_DEVELOPER_TESTS=OFF
      - -DCMAKE_INSTALL_PREFIX=/app/freecad
      - -DCMAKE_INSTALL_DATAROOTDIR=/app/share
      - -DINSTALL_TO_SITEPACKAGES=ON
      # While redundant (this triggers a warning with the linter) removing this
      # cause CMake to stop finding dependencies.
      - -DCMAKE_PREFIX_PATH=/app
    cleanup:
      - /freecad/include
      - /freecad/lib/cmake
    post-install:
      - install -Dm755 ../openscad.sh ${FLATPAK_DEST}/bin/openscad
      - ln -s /app/freecad/bin/FreeCADCmd /app/bin/FreeCADCmd
      - ln -s /app/freecad/bin/FreeCADCmd /app/bin/freecadcmd
      - ln -s /app/freecad/bin/FreeCAD /app/bin/FreeCAD
      - ln -s /app/freecad/bin/FreeCAD /app/bin/freecad
    sources:
      - type: git
        url: https://github.com/FreeCAD/FreeCAD.git
        commit: 34a9716668b1ddeb55b914f1c5be644826bdbbbf
        tag: 1.1.0
      - type: patch
        path: patches/OpenSCAD_transfermechanism.patch
      - type: file
        path: openscad.sh
      - type: shell
        commands:
          # revcount needs to be updated any time the source commit or tag is changed
          # to obtain the revcount for a given gitRef (commit hash, branch or tag) run
          # echo $(($(curl -s 'https://api.github.com/repos/FreeCAD/FreeCAD/compare/120ca87015...'"$gitRef"'' | grep '"ahead_by":' | sed -s 's/ //g;s/"ahead_by"://;s/,//')+1))
          - |
            revcount=44795
            sed -i 's|${PACKAGE_WCREF}|'"$revcount"' (Git)|' src/Build/Version.h.cmake
            sed -i 's|${PACKAGE_WCURL}|https://github.com/FreeCAD/FreeCAD.git|' src/Build/Version.h.cmake
          - | # fix paths for flatpak environment
            sed -i 's|/usr|/app|g' cMake/FindOCC.cmake src/Gui/GraphvizView.cpp
            sitepackagesDir=$(python3 -c 'import sysconfig; print(sysconfig.get_paths()["platlib"].replace("/usr","/app"))')
            sed -i "s|\${python_libs}|$sitepackagesDir|" src/Ext/freecad/CMakeLists.txt
